# Second dataset: 50 high-activity bills from 2024 (118th Congress, 2nd session).
# Run with:  CRS_DATASET=2024 CRS_CONFIG=config-2024.yaml python src/<stage>.py
# Bills are ranked by number of legislative actions (a signal of how consequential/active
# a bill was) before selecting the 50 with a CRS summary + retrievable text.

congress: 118
bill_types: [hr, s, hjres, sjres]
target_bills: 50
text_char_cap: 180000
summary_from_date: "2024-01-01T00:00:00Z"     # focus on bills active in 2024
summary_to_date: "2025-01-03T23:59:59Z"       # end of the 118th Congress
select_by_activity: true                       # rank candidates by action count
activity_pool_cap: 320                          # how many candidates to fetch action counts for

# --- same models, judge, and criteria as the main run, for an apples-to-apples comparison ---
models:
  - anthropic/claude-opus-4.8
  - openai/gpt-5.5
  - google/gemini-3.5-flash
  - z-ai/glm-5.2
  - deepseek/deepseek-v4-pro

# Judged by Opus 4.8 running as 10 parallel Claude Code subagents (free), with the FULL
# bill text and a verify-before-failing rule — same judge model as the 119th set.
# (An earlier Sonnet-subagent pass was discarded after it made accuracy errors.)
judge_model: claude-opus-4-8 (parallel Claude Code subagents)
judge_temperature: 0
judge_web_search: true
judge_web_max_results: 3

summarize_temperature: 0.3
max_output_tokens: 4000

prompts:
  summarize: prompts/summarize.txt
  judge: prompts/judge.txt
