<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Feedback Console · CRS Summary Benchmark</title>
<style>
  :root{
    --bg:#f6f7f9; --card:#fff; --ink:#1a2230; --muted:#5d6775; --line:#e3e7ec;
    --accent:#1f4e79; --accent-soft:#eaf1f8; --hi:#ff7a18; --hi-soft:#fff1e6;
    --pass:#1a7f4b; --fail:#c0392b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);display:flex;flex-direction:column;height:100vh;overflow:hidden}
  a{color:var(--accent)}

  header{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--accent);color:#fff;flex:0 0 auto;flex-wrap:wrap}
  header .brand{font-weight:700;font-size:15px;margin-right:4px}
  header .brand small{display:block;font-weight:400;opacity:.8;font-size:11px}
  .tabs{display:flex;gap:4px}
  .tabs button{background:rgba(255,255,255,.12);color:#fff;border:0;padding:6px 12px;border-radius:7px;font:inherit;font-size:13px;cursor:pointer}
  .tabs button.active{background:#fff;color:var(--accent);font-weight:600}
  .spacer{flex:1}
  .btn{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.25);padding:6px 12px;border-radius:7px;font:inherit;font-size:13px;cursor:pointer}
  .btn:hover{background:rgba(255,255,255,.24)}
  .btn.primary{background:var(--hi);border-color:var(--hi);font-weight:600}
  .btn.primary.on{background:#fff;color:var(--hi);box-shadow:0 0 0 2px var(--hi) inset}
  .count{font-size:12.5px;opacity:.9}

  main{flex:1;display:flex;min-height:0}
  .stage{flex:1;position:relative;min-width:0;background:#fff}
  iframe{width:100%;height:100%;border:0;display:block;background:#fff}
  #overlay{position:absolute;inset:0;pointer-events:none;z-index:5}
  #hl{position:absolute;border:2px solid var(--hi);background:rgba(255,122,24,.10);border-radius:4px;display:none;pointer-events:none;transition:all .03s linear}
  .pin{position:absolute;transform:translate(-50%,-110%);background:var(--hi);color:#fff;min-width:22px;height:22px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;pointer-events:auto;box-shadow:0 2px 6px rgba(0,0,0,.3);border:2px solid #fff}
  .pin.sel{background:var(--accent)}
  .mode-banner{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:var(--hi);color:#fff;padding:7px 16px;border-radius:99px;font-size:12.5px;font-weight:600;z-index:7;display:none;box-shadow:0 3px 12px rgba(0,0,0,.25);white-space:nowrap;max-width:calc(100% - 24px);overflow:hidden;text-overflow:ellipsis}
  .warn{position:absolute;top:10px;left:10px;right:10px;background:#fcebe9;color:#8a1c12;border:1px solid #e7b3ac;padding:10px 14px;border-radius:8px;font-size:13px;z-index:8;display:none}

  aside{width:360px;flex:0 0 360px;border-left:1px solid var(--line);background:var(--card);display:flex;flex-direction:column;min-height:0}
  aside h2{margin:0;padding:12px 16px;font-size:14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
  aside h2 .filter{margin-left:auto;font:inherit;font-size:12px;padding:3px 6px;border:1px solid var(--line);border-radius:6px}
  .list{flex:1;overflow:auto;padding:8px}
  .empty{color:var(--muted);text-align:center;padding:40px 16px;font-size:13px}
  .item{border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin-bottom:8px;cursor:pointer;background:#fff}
  .item:hover{border-color:#bcd0e4}
  .item.sel{border-color:var(--hi);box-shadow:0 0 0 2px var(--hi-soft)}
  .item .top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .item .num{background:var(--hi);color:#fff;width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex:0 0 auto}
  .item .pagebadge{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;font-weight:700;color:var(--accent);background:var(--accent-soft);padding:1px 7px;border-radius:99px}
  .item .cat{font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:99px}
  .cat-Design{color:#7a4ad1;background:#f1ebfb}.cat-Content{color:#0f7d8c;background:#e4f5f7}
  .cat-Bug{color:var(--fail);background:#fcebe9}.cat-Data{color:#8a5a00;background:#fcf2dd}.cat-Idea{color:var(--pass);background:#e6f4ec}
  .item .del{margin-left:auto;border:0;background:none;color:var(--muted);cursor:pointer;font-size:15px;line-height:1}
  .item .del:hover{color:var(--fail)}
  .item .target{font-size:11.5px;color:var(--muted);font-family:ui-monospace,Menlo,monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
  .item .body{font-size:13.5px;white-space:pre-wrap}

  /* composer popover */
  #composer{position:absolute;z-index:20;width:300px;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 30px rgba(20,30,50,.25);padding:12px;display:none}
  #composer .tg{font-size:11.5px;color:var(--muted);font-family:ui-monospace,Menlo,monospace;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:5px 7px;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #composer .row{display:flex;gap:6px;margin-bottom:8px}
  #composer select{flex:1;font:inherit;font-size:13px;padding:6px;border:1px solid var(--line);border-radius:6px}
  #composer textarea{width:100%;min-height:80px;font:inherit;font-size:13.5px;padding:8px;border:1px solid var(--line);border-radius:6px;resize:vertical}
  #composer .actions{display:flex;gap:8px;margin-top:8px;justify-content:flex-end}
  #composer .actions button{font:inherit;font-size:13px;padding:6px 14px;border-radius:7px;cursor:pointer;border:1px solid var(--line);background:#fff}
  #composer .actions .save{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
  .hint{padding:8px 16px;font-size:12px;color:var(--muted);border-top:1px solid var(--line);background:#fafbfc}
  kbd{background:#eef1f5;border:1px solid #d7dde5;border-bottom-width:2px;border-radius:4px;padding:0 5px;font-size:11px;font-family:ui-monospace,monospace}
</style>
</head>
<body>
<header>
  <div class="brand">Feedback Console<small>CRS Summary Benchmark — inline review</small></div>
  <div class="tabs" id="tabs">
    <button data-page="index" class="active">Leaderboard</button>
    <button data-page="bills">Bills</button>
    <button data-page="methodology">Methodology</button>
  </div>
  <button class="btn primary" id="commentBtn">💬 Comment mode</button>
  <span class="count" id="count">0 notes</span>
  <div class="spacer"></div>
  <button class="btn" id="exportBtn">⤓ Export JSON</button>
  <button class="btn" id="importBtn">⤒ Import</button>
  <input type="file" id="importFile" accept="application/json" hidden>
  <button class="btn" id="clearBtn">Clear</button>
</header>

<main>
  <div class="stage">
    <iframe id="site" src="index.html"></iframe>
    <div id="overlay"><div id="hl"></div></div>
    <div class="mode-banner" id="banner">Comment mode — click any element on the page to attach a note. Press <kbd>Esc</kbd> to exit.</div>
    <div class="warn" id="warn"></div>
    <div id="composer">
      <div class="tg" id="cTarget"></div>
      <div class="row">
        <select id="cCat">
          <option>Design</option><option>Content</option><option>Bug</option><option>Data</option><option>Idea</option>
        </select>
        <select id="cSev"><option value="">Severity…</option><option>Low</option><option>Medium</option><option>High</option></select>
      </div>
      <textarea id="cText" placeholder="What should change here?"></textarea>
      <div class="actions">
        <button id="cCancel">Cancel</button>
        <button class="save" id="cSave">Save note</button>
      </div>
    </div>
  </div>

  <aside>
    <h2>Notes <select class="filter" id="pageFilter">
      <option value="">all pages</option><option value="index">Leaderboard</option>
      <option value="bills">Bills</option><option value="methodology">Methodology</option>
    </select></h2>
    <div class="list" id="list"></div>
    <div class="hint">Toggle <b>Comment mode</b>, click an element, write a note. Notes autosave to this browser; <b>Export JSON</b> to hand off. Click a note to jump to it.</div>
  </aside>
</main>

<script>
"use strict";
const LS_KEY = "crs_feedback_v1";
const PAGES = ["index","bills","methodology"];
const $ = (id)=>document.getElementById(id);
const iframe=$("site"), overlay=$("overlay"), hl=$("hl"), banner=$("banner"),
      composer=$("composer"), warn=$("warn");
let state = { items: [], page:"index", mode:false, pending:null, sel:null, nextId:1 };

/* ---------- persistence ---------- */
function load(){ try{const r=JSON.parse(localStorage.getItem(LS_KEY)); if(r&&r.items){state.items=r.items; state.nextId=r.nextId||(Math.max(0,...r.items.map(i=>i.id))+1);}}catch(e){} }
function save(){ localStorage.setItem(LS_KEY, JSON.stringify({items:state.items,nextId:state.nextId})); }

/* ---------- iframe access ---------- */
function doc(){ try{ return iframe.contentDocument || iframe.contentWindow.document; }catch(e){ return null; } }
function win(){ try{ return iframe.contentWindow; }catch(e){ return null; } }
function pageFromPath(p){ const f=(p||"").split("/").pop().replace(".html",""); return PAGES.includes(f)?f:"index"; }

/* ---------- selector + label ---------- */
function cssPath(el){
  if(!el||el.nodeType!==1) return "";
  if(el.id) return "#"+CSS.escape(el.id);
  const parts=[]; let cur=el;
  while(cur && cur.nodeType===1 && cur.tagName.toLowerCase()!=="body"){
    if(cur.id){ parts.unshift("#"+CSS.escape(cur.id)); break; }
    let part=cur.tagName.toLowerCase();
    const parent=cur.parentElement;
    if(parent){
      const sibs=[...parent.children].filter(c=>c.tagName===cur.tagName);
      if(sibs.length>1) part+=`:nth-of-type(${sibs.indexOf(cur)+1})`;
    }
    parts.unshift(part); cur=cur.parentElement;
    if(parts.length>=7) break;
  }
  return parts.join(" > ");
}
function labelFor(el){
  const tag=el.tagName.toLowerCase();
  let txt=(el.textContent||"").replace(/\s+/g," ").trim();
  if(txt.length>60) txt=txt.slice(0,60)+"…";
  return `<${tag}>` + (txt?` "${txt}"`:"");
}

/* ---------- highlight + composer ---------- */
function styleEl(d){ let s=d.getElementById("__fb_style"); if(!s){ s=d.createElement("style"); s.id="__fb_style"; d.head.appendChild(s);} return s; }
function setCursor(on){ const d=doc(); if(d) styleEl(d).textContent = on ? "*{cursor:crosshair !important}" : ""; }

function showHL(rect){ hl.style.display="block"; hl.style.left=rect.left+"px"; hl.style.top=rect.top+"px"; hl.style.width=rect.width+"px"; hl.style.height=rect.height+"px"; }
function hideHL(){ hl.style.display="none"; }

function openComposer(el, clientX, clientY){
  state.pending = { el, selector: cssPath(el), label: labelFor(el),
                    elementText: (el.textContent||"").replace(/\s+/g," ").trim().slice(0,200) };
  $("cTarget").textContent = state.pending.selector || "(element)";
  $("cText").value=""; $("cCat").value="Design"; $("cSev").value="";
  composer.style.display="block";
  const sw=composer.offsetWidth, sh=composer.offsetHeight, pad=12;
  let x=Math.min(clientX+12, overlay.clientWidth - sw - pad);
  let y=Math.min(clientY+12, overlay.clientHeight - sh - pad);
  composer.style.left=Math.max(pad,x)+"px"; composer.style.top=Math.max(pad,y)+"px";
  setTimeout(()=>$("cText").focus(),10);
}
function closeComposer(){ composer.style.display="none"; state.pending=null; }

$("cCancel").onclick=closeComposer;
$("cSave").onclick=()=>{
  const txt=$("cText").value.trim(); if(!txt){ $("cText").focus(); return; }
  const p=state.pending; if(!p) return;
  state.items.push({ id: state.nextId++, page: state.page, selector:p.selector,
    label:p.label, elementText:p.elementText, category:$("cCat").value,
    severity:$("cSev").value||null, comment:txt,
    createdAt:new Date().toISOString(), viewport:`${iframe.clientWidth}x${iframe.clientHeight}` });
  save(); closeComposer(); renderList(); renderPins(); updateCount();
};

/* ---------- pins ---------- */
function renderPins(){
  overlay.querySelectorAll(".pin").forEach(p=>p.remove());
  const d=doc(); if(!d) return;
  state.items.filter(i=>i.page===state.page).forEach(i=>{
    let el=null; try{ el=d.querySelector(i.selector); }catch(e){}
    if(!el) return;
    const r=el.getBoundingClientRect();
    if(r.bottom<0||r.top>iframe.clientHeight) return; // scrolled out
    const pin=document.createElement("div");
    pin.className="pin"+(state.sel===i.id?" sel":""); pin.textContent=i.id;
    pin.style.left=(r.left+Math.min(r.width,40)/2)+"px"; pin.style.top=Math.max(12,r.top)+"px";
    pin.title=i.comment;
    pin.onclick=(e)=>{ e.stopPropagation(); selectItem(i.id,true); };
    overlay.appendChild(pin);
  });
}
let raf=null;
function schedulePins(){ if(raf) return; raf=requestAnimationFrame(()=>{raf=null; renderPins();}); }

/* ---------- list ---------- */
function renderList(){
  const f=$("pageFilter").value;
  const items=state.items.filter(i=>!f||i.page===f);
  const list=$("list");
  if(!items.length){ list.innerHTML=`<div class="empty">No notes yet.<br>Turn on <b>Comment mode</b> and click anything on the page.</div>`; return; }
  list.innerHTML=items.map(i=>`
    <div class="item ${state.sel===i.id?"sel":""}" data-id="${i.id}">
      <div class="top">
        <span class="num">${i.id}</span>
        <span class="pagebadge">${i.page}</span>
        <span class="cat cat-${i.category}">${i.category}${i.severity?" · "+i.severity:""}</span>
        <button class="del" data-del="${i.id}" title="Delete">×</button>
      </div>
      <div class="target">${escapeHtml(i.selector)}</div>
      <div class="body">${escapeHtml(i.comment)}</div>
    </div>`).join("");
}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

$("list").addEventListener("click",(e)=>{
  const del=e.target.closest("[data-del]");
  if(del){ e.stopPropagation(); const id=+del.dataset.del; state.items=state.items.filter(x=>x.id!==id); save(); renderList(); renderPins(); updateCount(); return; }
  const it=e.target.closest(".item"); if(it) selectItem(+it.dataset.id,true);
});

function selectItem(id, jump){
  state.sel=id; renderList(); renderPins();
  const i=state.items.find(x=>x.id===id); if(!i) return;
  if(jump && i.page!==state.page){ goPage(i.page, ()=>flash(i)); }
  else if(jump) flash(i);
}
function flash(i){
  const d=doc(); if(!d) return; let el=null; try{el=d.querySelector(i.selector);}catch(e){}
  if(!el) return;
  el.scrollIntoView({behavior:"smooth",block:"center"});
  const o=el.style.outline, ob=el.style.outlineOffset;
  el.style.outline="3px solid var(--hi)"; el.style.outlineOffset="2px";
  setTimeout(()=>{el.style.outline=o; el.style.outlineOffset=ob; schedulePins();},1400);
  setTimeout(schedulePins,400);
}

/* ---------- mode + navigation ---------- */
function setMode(on){
  state.mode=on; $("commentBtn").classList.toggle("on",on);
  $("commentBtn").textContent = on?"✓ Comment mode (on)":"💬 Comment mode";
  banner.style.display=on?"block":"none"; setCursor(on); if(!on){ hideHL(); closeComposer(); }
}
$("commentBtn").onclick=()=>setMode(!state.mode);
document.addEventListener("keydown",(e)=>{ if(e.key==="Escape"){ if(composer.style.display==="block") closeComposer(); else if(state.mode) setMode(false);} });

function setActiveTab(){ document.querySelectorAll("#tabs button").forEach(b=>b.classList.toggle("active",b.dataset.page===state.page)); }
function goPage(page, cb){
  state.page=page; setActiveTab();
  const want=page+".html";
  if((iframe.getAttribute("src")||"")!==want){ pendingCb=cb||null; iframe.src=want; }
  else { renderPins(); if(cb) cb(); }
}
let pendingCb=null;
$("tabs").addEventListener("click",(e)=>{ const b=e.target.closest("button"); if(b) goPage(b.dataset.page); });
$("pageFilter").addEventListener("change",renderList);

/* ---------- iframe load wiring ---------- */
iframe.addEventListener("load",()=>{
  const w=win(), d=doc();
  if(!w||!d){ warn.style.display="block"; warn.innerHTML="⚠ Can't read the page (cross-origin). Run this file from the same server as the site — e.g. <b>python -m http.server -d docs 8000</b> then open <b>localhost:8000/feedback.html</b> — for precise click-to-element feedback."; return; }
  warn.style.display="none";
  state.page=pageFromPath(w.location.pathname); setActiveTab(); $("pageFilter").value && renderList();
  setCursor(state.mode);
  d.addEventListener("mousemove",(e)=>{ if(!state.mode){hideHL();return;} const t=e.target; if(!t||t.nodeType!==1){hideHL();return;} showHL(t.getBoundingClientRect()); },true);
  d.addEventListener("click",(e)=>{ if(!state.mode) return; e.preventDefault(); e.stopPropagation(); openComposer(e.target, e.clientX, e.clientY); },true);
  w.addEventListener("scroll",schedulePins,{passive:true});
  renderPins(); if(pendingCb){ const cb=pendingCb; pendingCb=null; setTimeout(cb,150); }
});
window.addEventListener("resize",schedulePins);

/* ---------- export / import / clear ---------- */
function updateCount(){ $("count").textContent=state.items.length+" note"+(state.items.length===1?"":"s"); }
$("exportBtn").onclick=()=>{
  const payload={ tool:"crs-feedback", exportedAt:new Date().toISOString(),
    site:(location.origin+location.pathname).replace(/feedback\.html$/,""), count:state.items.length, items:state.items };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="crs-feedback.json"; a.click(); URL.revokeObjectURL(a.href);
};
$("importBtn").onclick=()=>$("importFile").click();
$("importFile").onchange=(e)=>{ const f=e.target.files[0]; if(!f) return; const r=new FileReader();
  r.onload=()=>{ try{ const j=JSON.parse(r.result); const items=Array.isArray(j)?j:j.items; if(!Array.isArray(items)) throw 0;
    state.items=items; state.nextId=Math.max(0,...items.map(i=>i.id||0))+1; save(); renderList(); renderPins(); updateCount();
  }catch(err){ alert("Could not read that JSON file."); } }; r.readAsText(f); e.target.value=""; };
$("clearBtn").onclick=()=>{ if(state.items.length && confirm("Delete all "+state.items.length+" notes?")){ state.items=[]; state.nextId=1; save(); renderList(); renderPins(); updateCount(); } };

/* ---------- boot ---------- */
load(); renderList(); updateCount(); setActiveTab();
</script>
</body>
</html>
